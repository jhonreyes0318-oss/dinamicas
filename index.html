<style>
  :root{
    --bg: #0b0b0b;
    --card-bg: #111111;
    --gold: #e8a33d;
    --gold-light: #f2c368;
    --green: #22c55e;
    --green-dark: #16a34a;
    --white: #ffffff;
    --muted: #b8b8b8;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body{
    background: var(--bg);
    color: var(--white);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    display:flex;
    justify-content:center;
    min-height:100vh;
    padding: 40px 20px 60px;
  }

  .wrap{
    width:100%;
    max-width:420px;
    text-align:center;
  }

  h1{
    font-size: 2.1rem;
    font-weight: 900;
    letter-spacing: 0.5px;
    color: var(--gold);
    text-shadow: 0 0 18px rgba(232,163,61,0.35);
    margin-bottom: 28px;
  }

  .card{
    position:relative;
    border-radius: 14px;
    overflow:hidden;
    background:#000;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .card img{
    display:block;
    width:100%;
    height:auto;
  }

  .wa-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 12px;
    width:100%;
    margin-top: 28px;
    padding: 18px 20px;
    background: var(--green);
    border: none;
    border-radius: 40px;
    color: #06210f;
    font-size: 1.02rem;
    font-weight: 800;
    letter-spacing: 0.2px;
    text-decoration:none;
    cursor:pointer;
    box-shadow: 0 8px 22px rgba(34,197,94,0.35);
    transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
  }

  .wa-btn:hover{
    background: var(--green-dark);
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(34,197,94,0.45);
  }

  .wa-btn:active{
    transform: translateY(0);
  }

  .wa-icon{
    width: 26px;
    height: 26px;
    background: #fff;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }

  .wa-icon svg{ width:16px; height:16px; }

  .info{
    margin-top: 34px;
  }

  .info h2{
    font-size: 1.15rem;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .info p{
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.55;
  }

  @media (max-width:380px){
    h1{ font-size:1.7rem; }
    .card-overlay .sorteo{ font-size:1.9rem; }
  }
</style>
</head>

     ============================================================ -->
